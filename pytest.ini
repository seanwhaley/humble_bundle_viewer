[pytest]
testpaths = backend/tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
pythonpath =
    backend/src

# Markers for organizing tests
markers =
    unit: Unit tests (isolated functions)
    integration: Integration tests (multiple components mocked)
    e2e: End-to-end tests (full workflow)
    slow: Slow tests that take > 1s
    skip_ci: Skip in CI/CD (requires auth/network)

# Coverage settings
addopts = 
    --verbose
    --strict-markers
    --tb=short
    --cov=backend/src/hb_library_viewer
    --cov=backend/app
    --cov-report=term-missing
    --cov-report=html
    --cov-branch
    --cov-fail-under=85

# Ignore deprecation warnings from dependencies
filterwarnings =
    ignore::DeprecationWarning
    ignore::PendingDeprecationWarning
